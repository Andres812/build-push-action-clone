# ============================
# WORKFLOW: ZIZMOR (ANÁLISIS DE SEGURIDAD DE WORKFLOWS)
# ============================
name: zizmor  # Nombre del workflow

# ============================
# PERMISOS GENERALES
# ============================
permissions:
  contents: read  # Solo permite leer el repositorio

# ============================
# CONTROL DE CONCURRENCIA
# ============================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}  # Agrupa por workflow + rama/tag
  cancel-in-progress: true  # Cancela ejecuciones anteriores si hay una nueva

# ============================
# EVENTOS QUE DISPARAN EL WORKFLOW
# ============================
on:
  workflow_dispatch:  # Permite ejecución manual

  push:
    branches:
      - 'master'        # Se ejecuta en cambios a master
      - 'releases/v*'   # También en ramas de versiones
    tags:
      - 'v*'            # También cuando se crean tags

  pull_request:         # También en Pull Requests

# ============================
# JOB PRINCIPAL
# ============================
jobs:
  zizmor:
    # Reutiliza un workflow externo (de crazy-max)
    uses: crazy-max/.github/.github/workflows/zizmor.yml@d89fe92d808a15e2b2ed5cdb62db7c172c31410d # v1.6.0

    # Permisos específicos para este job
    permissions:
      contents: read            # Leer el repositorio
      security-events: write    # Escribir resultados de seguridad

    # Parámetros que se envían al workflow reutilizado
    with:
      min-severity: medium     # Nivel mínimo de severidad a reportar
      min-confidence: medium   # Nivel mínimo de confianza del análisis
      persona: pedantic       # Nivel de estrictitud (más estricto)